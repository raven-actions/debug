---
name: Draft Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # pull_request:
  #   # Only following types are handled by the action, but one can default to all as well

jobs:
  draft-release:
    if: ${{ github.repository_owner == 'raven-actions' }}
    name: Draft Release
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Get Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: get-token
        with:
          app-id: ${{ secrets.ORG_BOT_APP_ID }}
          private-key: ${{ secrets.ORG_BOT_PRIVATE_KEY }}

      - name: Run Release Drafter
        uses: release-drafter/release-drafter@3a7fb5c85b80b1dda66e1ccb94009adbbd32fce3 # v7.0.0
        id: release-drafter
        with:
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Get Release URL
        run: |
          echo "${RELEASE_URL}"
          echo "${RELEASE_URL}" >> $GITHUB_STEP_SUMMARY
        env:
          RELEASE_URL: ${{ steps.release-drafter.outputs.html_url }}
